<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#1a2947"/>
  <!-- Airplane -->
  <g transform="translate(32,32) rotate(-30) translate(-32,-32)">
    <!-- Body -->
    <ellipse cx="32" cy="32" rx="14" ry="5" fill="white"/>
    <!-- Nose -->
    <polygon points="46,32 52,30 52,34" fill="white"/>
    <!-- Tail -->
    <polygon points="18,32 12,26 14,32 12,38" fill="white"/>
    <!-- Wing -->
    <polygon points="28,32 36,32 34,22 26,26" fill="white" opacity="0.9"/>
    <!-- Small wing -->
    <polygon points="22,32 28,32 27,37 21,36" fill="white" opacity="0.9"/>
  </g>
</svg>
